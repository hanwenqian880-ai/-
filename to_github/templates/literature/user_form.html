{% extends 'literature/base.html' %}

{% block title %}{{ title }} - 组会文献管理系统{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-person"></i> {{ title }}</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">用户名 *</label>
                        <input type="text" name="username" id="id_username" class="form-control" required
                               value="{{ form.username.value|default:'' }}">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="id_first_name" class="form-label">姓</label>
                            <input type="text" name="first_name" id="id_first_name" class="form-control"
                                   value="{{ form.first_name.value|default:'' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="id_last_name" class="form-label">名</label>
                            <input type="text" name="last_name" id="id_last_name" class="form-control"
                                   value="{{ form.last_name.value|default:'' }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="id_email" class="form-label">邮箱</label>
                        <input type="email" name="email" id="id_email" class="form-control"
                               value="{{ form.email.value|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label for="id_phone" class="form-label">联系电话</label>
                        <input type="text" name="phone" id="id_phone" class="form-control"
                               value="{{ form.phone.value|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label for="id_department" class="form-label">所属部门</label>
                        <input type="text" name="department" id="id_department" class="form-control"
                               value="{{ form.department.value|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label for="id_role" class="form-label">用户角色</label>
                        <select name="role" id="id_role" class="form-select">
                            <option value="member" {% if form.role.value == 'member' %}selected{% endif %}>普通成员</option>
                            <option value="admin" {% if form.role.value == 'admin' %}selected{% endif %}>管理员</option>
                        </select>
                    </div>

                    {% if user_obj %}
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" name="is_active" id="id_is_active" class="form-check-input"
                                   {% if form.is_active.value %}checked{% endif %}>
                            <label for="id_is_active" class="form-check-label">账号启用</label>
                        </div>
                    </div>
                    {% else %}
                    <div class="mb-3">
                        <label for="id_password1" class="form-label">密码 *</label>
                        <input type="password" name="password1" id="id_password1" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password2" class="form-label">确认密码 *</label>
                        <input type="password" name="password2" id="id_password2" class="form-control" required>
                    </div>
                    {% endif %}

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> 保存
                        </button>
                        <a href="{% url 'user_list' %}" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
