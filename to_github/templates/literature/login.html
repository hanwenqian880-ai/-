{% extends 'literature/base.html' %}

{% block title %}登录 - 组会文献管理系统{% endblock %}

{% block login_content %}
<div class="card">
    <div class="card-body p-5">
        <div class="text-center mb-4">
            <i class="bi bi-journal-bookmark-fill text-primary" style="font-size: 3rem;"></i>
            <h3 class="mt-3">组会文献管理系统</h3>
            <p class="text-muted">请登录以继续使用</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label">用户名</label>
                <input type="text" name="username" id="id_username"
                       class="form-control form-control-lg" placeholder="请输入用户名" autofocus required>
            </div>
            <div class="mb-3">
                <label for="id_password" class="form-label">密码</label>
                <input type="password" name="password" id="id_password"
                       class="form-control form-control-lg" placeholder="请输入密码" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="bi bi-box-arrow-in-right"></i> 登录
                </button>
            </div>
        </form>

        <hr class="my-4">
        <div class="text-center text-muted small">
            <p>首次使用请联系管理员创建账号</p>
            <p class="mb-0">默认管理员账号: admin / admin123</p>
        </div>
    </div>
</div>
{% endblock %}
